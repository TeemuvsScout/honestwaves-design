.kpi-sub { font-size:11px; color:var(--c-text-2); margin-top:4px; }
.card { background:var(--c-surface); border:1px solid var(--c-border); border-radius:var(--r-md); box-shadow:0 1px 2px rgba(15,23,42,.04); margin-bottom:16px; }
.card-head { padding:14px 18px; border-bottom:1px solid var(--c-border); display:flex; align-items:center; gap:10px; }
.card-title { font-size:14px; font-weight:600; margin:0; }
.card-sub { font-size:12px; color:var(--c-text-muted); }
.card-foot { padding:10px 18px; border-top:1px solid var(--c-border); display:flex; align-items:center; gap:10px; font-size:12px; color:var(--c-text-2); background:var(--c-surface-2); }

.p-button-xs { height:22px; padding:0 7px; font-size:10px; gap:4px; }

.p-tag-danger { background:var(--c-danger-soft); color:var(--c-danger); }

<script type="module">
import { createApp, ref, computed, reactive, watch } from 'https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.js';

const STATE_KEY = 'hw.aa.accounting.v1';

function seed() {
  return {
    journalEntries: [
      { id:'JE-1011', date:'Jun 11', event:'PHN-0017 marked lost',       debit:'5650 Loss on Asset',  credit:'1520 IT Equipment',  amount_cents:59900,  status:'Synced QB' },
      { id:'JE-1012', date:'Jun 11', event:'Period depreciation',         debit:'5510 Depreciation',   credit:'1521 Accum. Depr.',  amount_cents:156400, status:'Synced QB' },
      { id:'JE-1013', date:'Jun 6',  event:'Repair invoice TechFix',     debit:'5410 Equipment Repair',credit:'2110 AP TechFix',   amount_cents:26800,  status:'Synced QB' },
      { id:'JE-1014', date:'May 28', event:'Batch battery swap',         debit:'5410 Equipment Repair',credit:'2110 AP TechFix',   amount_cents:21600,  status:'Synced QB' },
      { id:'JE-1015', date:'May 14', event:'Cost-center chargeback',     debit:'1380 ER Dept CB',     credit:'5650 Loss on Asset', amount_cents:124700, status:'Pending review' },
    ],
  };
}

function load() {
  try { const r = localStorage.getItem(STATE_KEY); if (r) return JSON.parse(r); } catch(e){}
  const s = seed(); localStorage.setItem(STATE_KEY, JSON.stringify(s)); return s;
}
function save(s) { try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch(e){} }

const fmt = {
  money: (cents) => '$' + Math.round(cents/100).toLocaleString('en-US'),
  moneyDec: (cents) => '$' + (cents/100).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }),
};

const App = {
  setup() {
    const state = reactive(load());
    const subtab = ref('Depreciation');
    const toasts = ref([]);
    watch(state, () => save(state), { deep:true });

    const syncedJEs = computed(() => state.journalEntries.filter(j => j.status === 'Synced QB').length);
    const pendingJEs = computed(() => state.journalEntries.filter(j => j.status === 'Pending review').length);

    const showToast = (severity, summary, detail) => {
      const id = Date.now() + Math.random();
      toasts.value.push({ id, severity, summary, detail });
      setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 3500);
    };

    const reviewJE = (je) => {
      if (je.status === 'Pending review') {
        je.status = 'Synced QB';
        showToast('success', 'JE approved', je.id + ' synced to QuickBooks');
      }
    };

    const resetAll = () => {
      if (confirm('Reset Accounting state to seed data?')) {
        localStorage.removeItem(STATE_KEY);
        location.reload();
      }
    };

    return { state, subtab, toasts, syncedJEs, pendingJEs, reviewJE, resetAll, fmt };

          <tr><td><strong>iPhone 16e (all)</strong></td><td class="num">$21,264</td><td class="num">$28,560</td><td class="num" style="color:var(--c-warning-text);">+$7,296</td><td class="num">$1,751</td></tr>
          <tr><td><strong>AiRista badges</strong></td><td class="num">$1,417</td><td class="num">$2,128</td><td class="num" style="color:var(--c-warning-text);">+$711</td><td class="num">$171</td></tr>
          <tr><td><strong>Pixel 8 Pro</strong></td><td class="num">$1,998</td><td class="num">$2,558</td><td class="num" style="color:var(--c-warning-text);">+$560</td><td class="num">$134</td></tr>
