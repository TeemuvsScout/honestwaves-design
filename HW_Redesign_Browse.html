<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HonestWaves Redesign · Prototype Browser</title>
  <style>
    :root {
      --c-surface:#FFFFFF; --c-surface-2:#FAFAFB; --c-surface-3:#F4F5F7;
      --c-border:#E5E7EB; --c-border-strong:#D1D5DB; --c-divider:#EDF0F4;
      --c-text:#0F172A; --c-text-2:#475569; --c-text-muted:#94A3B8;
      --c-brand:#2563EB; --c-brand-hover:#1D4ED8; --c-brand-soft:#EFF6FF; --c-brand-deep:#1E40AF;
      --c-success:#10B981; --c-success-soft:#ECFDF5;
      --c-warning:#F59E0B; --c-warning-soft:#FFFBEB; --c-warning-text:#B45309;
      --c-danger:#EF4444; --c-danger-soft:#FEF2F2;
      --c-info:#6366F1; --c-info-soft:#EEF2FF;
      --c-violet:#7C3AED; --c-violet-soft:#F5F3FF;
      --c-cyan:#06B6D4;
      --font-sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
      --font-mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
      --side-w: 264px; --topbar-h: 52px;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:var(--font-sans);font-size:13px;line-height:1.45;color:var(--c-text);background:var(--c-surface-2);-webkit-font-smoothing:antialiased;overflow:hidden}
    a{color:inherit;text-decoration:none}
    button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
    svg{display:block}

    /* Top bar */
    .topbar{height:var(--topbar-h);background:var(--c-surface);border-bottom:1px solid var(--c-border);display:flex;align-items:center;padding:0 20px;gap:14px;position:relative;z-index:5}
    .brand{display:flex;align-items:center;gap:10px;width:calc(var(--side-w) - 28px)}
    .logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--c-brand),var(--c-brand-deep));display:grid;place-items:center;color:white;font-weight:700;font-size:14px}
    .brand-title{font-weight:600;font-size:14px;letter-spacing:-.01em;line-height:1.1}
    .brand-sub{color:var(--c-text-muted);font-size:11px}
    .crumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--c-text-2);flex:1}
    .crumb strong{color:var(--c-text);font-weight:600}
    .crumb .sep{color:var(--c-text-muted);font-size:12px}
    .topbar-actions{display:flex;align-items:center;gap:6px}
    .btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;font-size:12px;font-weight:500;color:var(--c-text);background:var(--c-surface);border:1px solid var(--c-border);border-radius:6px;box-shadow:0 1px 2px rgba(15,23,42,.04);transition:background .12s,border-color .12s}
    .btn:hover{background:var(--c-surface-3);border-color:var(--c-border-strong)}
    .btn.primary{background:var(--c-brand);color:white;border-color:var(--c-brand)}
    .btn.primary:hover{background:var(--c-brand-hover);border-color:var(--c-brand-hover)}

    /* Body */
    .body{display:grid;grid-template-columns:var(--side-w) 1fr;height:calc(100vh - var(--topbar-h))}

    /* Sidebar */
    .side{background:var(--c-surface);border-right:1px solid var(--c-border);overflow-y:auto;padding:14px 8px}
    .side-search{margin:0 6px 12px;display:flex;align-items:center;gap:8px;height:32px;padding:0 10px;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:6px;color:var(--c-text)}
    .side-search:focus-within{background:var(--c-surface);border-color:var(--c-brand);box-shadow:0 0 0 3px var(--c-brand-soft)}
    .side-search input{flex:1;height:100%;border:0;background:transparent;outline:none;font:inherit;color:inherit;font-size:13px}
    .side-search input::placeholder{color:var(--c-text-muted)}
    .side-search-kbd{padding:1px 5px;font-family:var(--font-mono);font-size:10px;color:var(--c-text-2);background:var(--c-surface);border:1px solid var(--c-border);border-radius:3px;flex-shrink:0}

    .group{margin-bottom:14px}
    .group-label{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;margin-bottom:3px}
    .group-label-text{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-text-muted)}
    .group-label-count{font-size:10px;color:var(--c-text-muted);font-family:var(--font-mono)}

    .item{display:flex;align-items:flex-start;gap:10px;padding:7px 12px;border-radius:6px;color:var(--c-text-2);cursor:pointer;transition:background .12s,color .12s;position:relative}
    .item:hover{background:var(--c-surface-3);color:var(--c-text)}
    .item.active{background:var(--c-brand-soft);color:var(--c-brand-deep)}
    .item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:2px;background:var(--c-brand);border-radius:2px}
    .item-num{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--c-text-muted);padding:2px 5px;background:var(--c-surface-3);border-radius:3px;line-height:1;flex-shrink:0;margin-top:2px}
    .item.active .item-num{background:var(--c-brand);color:white}
    .item-meta{flex:1;min-width:0;line-height:1.35}
    .item-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px}
    .item.active .item-title{font-weight:600}
    .item-desc{font-size:11px;color:var(--c-text-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis}
    .item-tag{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;background:var(--c-violet-soft);color:var(--c-violet);text-transform:uppercase;letter-spacing:.04em;line-height:1.2;flex-shrink:0}
    .item-tag.partial{background:var(--c-warning-soft);color:var(--c-warning-text)}

    .side-foot{margin-top:18px;padding:12px 12px 6px;border-top:1px solid var(--c-divider)}
    .side-foot-meta{font-size:10px;color:var(--c-text-muted);font-family:var(--font-mono);margin-top:6px}

    /* Main / iframe area */
    .main{position:relative;background:var(--c-surface-2);overflow:hidden}
    .frame{width:100%;height:100%;border:0;background:white;display:block}

    /* Empty state shown when no prototype is loaded (initial) */
    .empty{display:none;align-items:center;justify-content:center;height:100%;flex-direction:column;color:var(--c-text-muted)}
    .empty.show{display:flex}
    .empty svg{margin-bottom:14px}

    /* Toast for share-copied */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--c-text);color:white;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(15,23,42,.18);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <div class="logo-mark">H</div>
      <div>
        <div class="brand-title">HonestWaves Redesign</div>
        <div class="brand-sub">Prototype browser · v2</div>
      </div>
    </div>
    <div class="crumb">
      <span class="sep">Prototype</span>
      <span class="sep">›</span>
      <strong id="crumbTitle">Loading…</strong>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="openNewTab()" title="Open in new tab">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
        Open in new tab
      </button>
      <button class="btn primary" onclick="copyShareUrl()" id="shareBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
        Share this view
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="side">
      <div class="side-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--c-text-muted);"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        <input type="text" id="filter" placeholder="Filter prototypes…">
        <span class="side-search-kbd">/</span>
      </div>

      <div id="sidebar-content"></div>

      <div class="side-foot">
        <a class="item" href="https://github.com/TeemuvsScout/honestwaves-design" target="_blank" style="padding:6px 12px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          <span class="item-meta"><span class="item-title">GitHub repo</span><span class="item-desc">View the source on GitHub →</span></span>
        </a>
        <div class="side-foot-meta">
          v2 · 12 prototypes · 9 deployments
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <iframe id="frame" class="frame" src="" title="Selected prototype"></iframe>
      <div class="empty" id="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <div>Pick a prototype on the left</div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast">Link copied to clipboard ✓</div>

  <script>
    // ============================================================
    // Prototype catalog — single source of truth
    // ============================================================
    const PROTOTYPES = [
      {
        group: "Foundation",
        items: [
          { id: "01", title: "Chrome + Dashboard", file: "HW_Redesign_01_Chrome_and_Dashboard.html",
            desc: "Global chrome, sidebar, design system" }
        ]
      },
      {
        group: "Monitor",
        items: [
          { id: "02", title: "Mission Control", file: "HW_Redesign_02_Mission_Control.html",
            desc: "Live per-locker bay state" }
        ]
      },
      {
        group: "Manage",
        items: [
          { id: "03", title: "Lockers", file: "HW_Redesign_03_Lockers.html",
            desc: "Lockers · Locations · Templates" },
          { id: "04", title: "Devices", file: "HW_Redesign_04_Devices.html",
            desc: "Devices + Models" },
          { id: "05", title: "Users", file: "HW_Redesign_05_Users.html",
            desc: "Users · Departments · Guests" },
          { id: "07", title: "Access matrix", file: "HW_Redesign_07_Access_Matrix.html",
            desc: "Who can open which bays" }
        ]
      },
      {
        group: "Investigate",
        items: [
          { id: "08", title: "Notifications", file: "HW_Redesign_08_Notifications.html",
            desc: "Alerts + custom rules", tag: "partial" },
          { id: "09", title: "Tracker", file: "HW_Redesign_09_Tracker.html",
            desc: "Trace history per entity" },
          { id: "06", title: "Reports", file: "HW_Redesign_06_Reports.html",
            desc: "Activity log + scheduled", tag: "partial" }
        ]
      },
      {
        group: "System",
        items: [
          { id: "10", title: "Software updates", file: "HW_Redesign_10_Software_Updates.html",
            desc: "Firmware + app pushes" },
          { id: "11", title: "Settings", file: "HW_Redesign_11_Settings.html",
            desc: "Profile · Self-registration · SSO" }
        ]
      },
      {
        group: "Finance",
        items: [
          { id: "13", title: "Asset Accounting", file: "HW_Redesign_13_Asset_Accounting.html",
            desc: "Loss · Inventory · Repair · Rules", tag: "new" }
        ]
      },
      {
        group: "Cross-cutting",
        items: [
          { id: "12", title: "Modals & states", file: "HW_Redesign_12_Modals_States.html",
            desc: "Pattern library" },
          { id: "404", title: "404 · Pixar", file: "HW_Redesign_404_Pixar.html",
            desc: "Page-not-found brand moment" }
        ]
      }
    ];

    function flatItems() {
      const all = [];
      PROTOTYPES.forEach(g => g.items.forEach(i => all.push(i)));
      return all;
    }

    // ============================================================
    // Render sidebar
    // ============================================================
    function renderSidebar(filter = "") {
      const f = filter.toLowerCase().trim();
      const html = PROTOTYPES.map(group => {
        const items = group.items.filter(i =>
          !f || i.title.toLowerCase().includes(f) || i.desc.toLowerCase().includes(f) || i.id.includes(f)
        );
        if (!items.length) return "";
        return `
          <div class="group">
            <div class="group-label">
              <span class="group-label-text">${group.group}</span>
              <span class="group-label-count">${items.length}</span>
            </div>
            ${items.map(item => `
              <div class="item" data-id="${item.id}" onclick="loadProto('${item.id}')">
                <span class="item-num">${item.id}</span>
                <span class="item-meta">
                  <span class="item-title">${item.title}${item.tag === "partial" ? `<span class="item-tag partial" title="Partial — main view built, some sub-panels stubbed">partial</span>` : ""}</span>
                  <span class="item-desc">${item.desc}</span>
                </span>
              </div>
            `).join("")}
          </div>
        `;
      }).join("");
      document.getElementById("sidebar-content").innerHTML = html;
      // Re-apply active state
      setActive(currentId());
    }

    // ============================================================
    // Loading
    // ============================================================
    function findItem(id) {
      return flatItems().find(i => i.id === id);
    }

    function loadProto(id) {
      const item = findItem(id);
      if (!item) return;
      const frame = document.getElementById("frame");
      const empty = document.getElementById("empty");
      frame.src = item.file;
      frame.style.display = "block";
      empty.classList.remove("show");
      document.getElementById("crumbTitle").textContent = `${item.id} · ${item.title}`;
      document.title = `${item.title} · HonestWaves Redesign`;
      setActive(id);
      // Update URL hash without scrolling
      const newHash = "#" + id;
      if (location.hash !== newHash) {
        history.replaceState(null, "", newHash);
      }
    }

    function setActive(id) {
      document.querySelectorAll(".item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === id);
      });
    }

    function currentId() {
      return location.hash.replace("#", "") || "01";
    }

    // ============================================================
    // Share button — copy current URL
    // ============================================================
    function copyShareUrl() {
      const url = location.href;
      navigator.clipboard.writeText(url).then(() => {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
      }).catch(() => {
        prompt("Copy this URL:", url);
      });
    }

    function openNewTab() {
      const item = findItem(currentId());
      if (item) window.open(item.file, "_blank");
    }

    // ============================================================
    // Boot
    // ============================================================
    renderSidebar();
    loadProto(currentId());

    // Hash routing
    window.addEventListener("hashchange", () => loadProto(currentId()));

    // Filter input
    document.getElementById("filter").addEventListener("input", e => {
      renderSidebar(e.target.value);
    });

    // Keyboard shortcut: "/" focuses filter
    document.addEventListener("keydown", e => {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
        e.preventDefault();
        document.getElementById("filter").focus();
      }
    });
  </script>
</body>
</html>
