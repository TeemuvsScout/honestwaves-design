<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asset Accounting - HonestWaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css">
<style>
:root {
  --c-bg:#F8FAFC;
  --c-surface:#FFFFFF;
  --c-surface-2:#F4F5F7;
  --c-border:#E5E7EB;
  --c-divider:#EDF0F4;
  --c-text:#0F172A;
  --c-text-2:#475569;
  --c-text-muted:#94A3B8;
  --c-brand:#2563EB;
  --c-brand-soft:#EFF6FF;
  --c-violet:#7C3AED;
  --c-violet-soft:#F5F3FF;
  --sidebar-w: 256px;
  --topbar-h: 48px;
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; height:100%; font-family:'Inter',system-ui,sans-serif; font-size:13px; color:var(--c-text); background:var(--c-bg); }

/* Top bar */
.topbar {
  height: var(--topbar-h);
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display:flex; align-items:center; gap:16px; padding:0 16px;
  position:fixed; top:0; left:0; right:0; z-index:50;
}
.brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; }
.brand-mark { width:20px; height:20px; background:var(--c-brand); border-radius:5px; display:inline-flex; align-items:center; justify-content:center; color:white; font-size:11px; font-weight:700; }
.crumbs { color:var(--c-text-muted); font-size:13px; margin-left:8px; }
.crumbs strong { color:var(--c-text); }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.topbar-link { color:var(--c-text-2); font-size:12px; text-decoration:none; padding:6px 10px; border-radius:6px; }
.topbar-link:hover { background:var(--c-surface-2); color:var(--c-text); }
.avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg, #6366F1, #8B5CF6); color:white; display:inline-flex; align-items:center; justify-content:center; font-weight:600; font-size:11px; }

/* Sidebar */
.sidebar {
  position:fixed; top:var(--topbar-h); left:0; bottom:0;
  width: var(--sidebar-w);
  background: var(--c-surface);
  border-right: 1px solid var(--c-border);
  overflow-y:auto;
  padding: 12px 0;
}
.sb-group { padding: 8px 0; }
.sb-group + .sb-group { border-top: 1px solid var(--c-divider); }
.sb-group-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--c-text-muted); padding: 6px 16px; }
.sb-item { display:flex; align-items:center; gap:10px; padding: 7px 16px; font-size:13px; color:var(--c-text-2); cursor:pointer; border:0; background:transparent; width:100%; text-align:left; font-family:inherit; transition: background 80ms; }
.sb-item:hover { background:var(--c-surface-2); color:var(--c-text); }
.sb-item.active { background:var(--c-brand-soft); color:var(--c-brand); font-weight:600; border-right: 2px solid var(--c-brand); }
.sb-item i { font-size:14px; width:16px; text-align:center; }
.sb-tag { margin-left:auto; font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; background:var(--c-violet-soft); color:var(--c-violet); letter-spacing:.04em; }

/* Main */
.main {
  margin-top: var(--topbar-h);
  margin-left: var(--sidebar-w);
  min-height: calc(100vh - var(--topbar-h));
  position: relative;
}
.frame {
  width:100%; height: calc(100vh - var(--topbar-h)); border:0; display:block;
}

.hint {
  position: fixed; bottom: 16px; right: 16px;
  background: var(--c-surface); border:1px solid var(--c-border); border-radius:6px;
  padding: 8px 12px; font-size:11px; color:var(--c-text-2);
  box-shadow: 0 4px 12px rgba(15,23,42,.08);
  z-index: 40;
}
.hint code { background: var(--c-surface-2); padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-mark">H</span> HonestWaves</div>
  <div class="crumbs">Admin / <strong>Asset Accounting</strong></div>
  <div class="topbar-right">
    <a class="topbar-link" href="https://teemuvsscout.github.io/honestwaves-design/index.html"><i class="pi pi-th-large" style="font-size:12px;"></i> All prototypes</a>
    <a class="topbar-link" href="#" id="resetAllBtn">Reset all state</a>
    <span class="avatar">JS</span>
  </div>
</div>

<aside class="sidebar">
  <div class="sb-group">
    <div class="sb-group-title">At a glance</div>
    <button class="sb-item" data-pane="overview"><i class="pi pi-th-large"></i> Overview</button>
    <button class="sb-item" data-pane="insights"><i class="pi pi-bolt"></i> Insights <span class="sb-tag">NEW</span></button>
  </div>
  <div class="sb-group">
    <div class="sb-group-title">Asset lifecycle</div>
    <button class="sb-item" data-pane="inventory"><i class="pi pi-box"></i> Inventory</button>
    <button class="sb-item" data-pane="lossdamage"><i class="pi pi-exclamation-triangle"></i> Loss and damage</button>
    <button class="sb-item" data-pane="repair"><i class="pi pi-wrench"></i> Repair</button>
  </div>
  <div class="sb-group">
    <div class="sb-group-title">Finance</div>
    <button class="sb-item" data-pane="accounting"><i class="pi pi-dollar"></i> Accounting and ERP <span class="sb-tag">NEW</span></button>
  </div>
  <div class="sb-group">
    <div class="sb-group-title">Configuration</div>
    <button class="sb-item" data-pane="rules"><i class="pi pi-sliders-h"></i> Rules</button>
  </div>
  <div class="sb-group">
    <div class="sb-group-title">Related</div>
    <a class="sb-item" href="https://teemuvsscout.github.io/honestwaves-design/HW_Devices_Interactive.html" target="_blank"><i class="pi pi-mobile"></i> Devices (interactive)</a>
    <a class="sb-item" href="https://teemuvsscout.github.io/honestwaves-design/HW_PixarV2_Asset_Accounting.html" target="_blank"><i class="pi pi-eye"></i> Static reference</a>
  </div>
</aside>

<main class="main">
  <iframe id="paneFrame" class="frame" src="HW_AA_Overview.html"></iframe>
</main>

<div class="hint">URL hash routes the pane, e.g. <code>#insights</code>, <code>#accounting</code>.</div>

<script>
(function() {
  const PANES = {
    overview:   'HW_AA_Overview.html',
    insights:   'HW_AA_Insights.html',
    inventory:  'HW_AA_Inventory.html',
    lossdamage: 'HW_AA_LossDamage.html',
    repair:     'HW_AA_Repair.html',
    accounting: 'HW_AA_Accounting.html',
    rules:      'HW_AA_Rules.html',
  };
  const frame = document.getElementById('paneFrame');
  const items = document.querySelectorAll('.sb-item[data-pane]');

  function go(pane) {
    if (!PANES[pane]) pane = 'overview';
    frame.src = PANES[pane];
    items.forEach(b => b.classList.toggle('active', b.dataset.pane === pane));
    if (location.hash !== '#' + pane) {
      history.replaceState(null, '', '#' + pane);
    }
    document.title = pane.charAt(0).toUpperCase() + pane.slice(1) + ' - Asset Accounting - HonestWaves';
  }

  items.forEach(btn => btn.addEventListener('click', () => go(btn.dataset.pane)));
  window.addEventListener('hashchange', () => go(location.hash.slice(1) || 'overview'));

  go(location.hash.slice(1) || 'overview');

  document.getElementById('resetAllBtn').addEventListener('click', (e) => {
    e.preventDefault();
    if (!confirm('Wipe localStorage for all 7 panes? This resets every demo to seed data.')) return;
    ['hw.aa.overview.v1','hw.aa.insights.v1','hw.aa.inventory.v1','hw.aa.lossdamage.v1','hw.aa.repair.v1','hw.aa.accounting.v1','hw.aa.rules.v1'].forEach(k => localStorage.removeItem(k));
    frame.contentWindow.location.reload();
    alert('State reset. Reload each pane to see seed data.');
  });
})();
</script>

</body>
</html>
